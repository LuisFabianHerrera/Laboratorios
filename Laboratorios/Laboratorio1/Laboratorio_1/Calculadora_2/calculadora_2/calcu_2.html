<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Calculadora JQuery</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card p-4 shadow">
        <h3 class="text-center mb-4">CALCULADORA</h3>

        <input type="number" id="valor1" class="form-control mb-3" placeholder="Primer número">
        <input type="number" id="valor2" class="form-control mb-3" placeholder="Segundo número">

        <div class="d-grid gap-2">
            <button class="btn btn-primary" id="sumar">Sumar</button>
            <button class="btn btn-danger" id="restar">Restar</button>
            <button class="btn btn-success" id="multiplicar">Multiplicar</button>
            <button class="btn btn-warning" id="dividir">Dividir</button>
        </div>

        <h4 class="mt-4">Resultado: <span id="resultado"></span></h4>
    </div>
</div>

<script>
$(document).ready(function(){

    // Función para obtener y validar los valores
    function obtenerValores() {
        let n1 = parseFloat($("#valor1").val());
        let n2 = parseFloat($("#valor2").val());
        
        if (isNaN(n1) || isNaN(n2)) {
            alert("Por favor, ingresa ambos números");
            return null;
        }
        return { n1, n2 };
    }

    $("#sumar").click(function(){
        let valores = obtenerValores();
        if (valores) {
            $("#resultado").text(valores.n1 + valores.n2);
        }
    });

    $("#restar").click(function(){
        let valores = obtenerValores();
        if (valores) {
            $("#resultado").text(valores.n1 - valores.n2);
        }
    });

    $("#multiplicar").click(function(){
        let valores = obtenerValores();
        if (valores) {
            $("#resultado").text(valores.n1 * valores.n2);
        }
    });

    $("#dividir").click(function(){
        let valores = obtenerValores();
        if (valores) {
            if(valores.n2 === 0){
                alert("No se puede dividir entre 0");
            } else {
                $("#resultado").text(valores.n1 / valores.n2);
            }
        }
    });

});
</script>

</body>
</html>
