<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokédex con AJAX</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome para iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        .pokemon-card {
            transition: transform 0.3s;
            cursor: pointer;
        }

        .pokemon-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .loading-spinner {
            display: none;
            text-align: center;
            padding: 50px;
        }

        .pokemon-img {
            width: 150px;
            height: 150px;
            object-fit: contain;
        }

        /* Colores personalizados para tipos */
        .bg-purple {
            background-color: #6f42c1 !important;
        }

        .bg-pink {
            background-color: #e83e8c !important;
        }
    </style>
</head>

<body class="bg-light">
    <div class="container py-5">
        <!-- Título principal -->
        <h1 class="text-center mb-4">
            <i class="fas fa-pokeball text-danger"></i>
            Pokédex con AJAX
        </h1>

        <!-- Barra de búsqueda -->
        <div class="row justify-content-center mb-4">
            <div class="col-md-8 col-lg-6">
                <div class="input-group">
                    <input type="text" 
                           id="pokemonInput" 
                           class="form-control" 
                           placeholder="Ingresa nombre o ID del Pokémon (ej: pikachu, 25)">
                    <button class="btn btn-primary" type="button" id="searchBtn">
                        <i class="fas fa-search"></i> Buscar
                    </button>
                    <button class="btn btn-success" type="button" id="randomBtn">
                        <i class="fas fa-random"></i> Aleatorio
                    </button>
                </div>
                <div class="form-text text-center mt-2">
                    <i class="fas fa-info-circle"></i>
                    Prueba con: pikachu, charizard, 25, 150, 6
                </div>
            </div>
        </div>

        <!-- Spinner de carga -->
        <div id="loadingSpinner" class="loading-spinner">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Cargando...</span>
            </div>
            <p class="mt-2">Buscando Pokémon...</p>
        </div>

        <!-- Mensaje de error -->
        <div id="errorMessage" class="alert alert-danger d-none text-center" role="alert">
            <i class="fas fa-exclamation-triangle"></i>
            Pokémon no encontrado. Intenta con otro nombre o ID.
        </div>

        <!-- Tarjeta de Pokémon -->
        <div id="pokemonCard" class="row justify-content-center d-none">
            <div class="col-md-10 col-lg-8">
                <div class="card pokemon-card">
                    <div class="row g-0">
                        <!-- Imagen y nombre del Pokémon -->
                        <div class="col-md-4 text-center p-4 bg-light rounded-start">
                            <img id="pokemonImage" src="" class="pokemon-img img-fluid" alt="Pokémon">
                            <h3 id="pokemonName" class="mt-3 text-capitalize mb-1"></h3>
                            <span id="pokemonId" class="badge bg-secondary fs-6"></span>
                        </div>
                        
                        <!-- Detalles del Pokémon -->
                        <div class="col-md-8">
                            <div class="card-body p-4">
                                <div class="row">
                                    <!-- Estadísticas Base -->
                                    <div class="col-md-6">
                                        <h5 class="card-title">
                                            <i class="fas fa-chart-bar text-primary"></i>
                                            Estadísticas Base
                                        </h5>
                                        <div id="stats" class="mb-4"></div>
                                    </div>
                                    
                                    <!-- Tipos y Habilidades -->
                                    <div class="col-md-6">
                                        <h5 class="card-title">
                                            <i class="fas fa-tags text-success"></i>
                                            Tipo(s)
                                        </h5>
                                        <div id="types" class="mb-4"></div>
                                        
                                        <h5 class="card-title">
                                            <i class="fas fa-star text-warning"></i>
                                            Habilidades
                                        </h5>
                                        <div id="abilities" class="mb-4"></div>
                                    </div>
                                </div>
                                
                                <!-- Altura, Peso y Experiencia Base -->
                                <div class="row text-center border-top pt-3 mt-2">
                                    <div class="col-4">
                                        <small class="text-muted d-block">Altura</small>
                                        <span id="height" class="fw-bold fs-5"></span>
                                    </div>
                                    <div class="col-4">
                                        <small class="text-muted d-block">Peso</small>
                                        <span id="weight" class="fw-bold fs-5"></span>
                                    </div>
                                    <div class="col-4">
                                        <small class="text-muted d-block">Experiencia Base</small>
                                        <span id="baseExperience" class="fw-bold fs-5"></span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- jQuery y Bootstrap JS -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        $(document).ready(function () {
            // ============================================
            // FUNCIONES PRINCIPALES
            // ============================================

            /**
             * Función para buscar Pokémon en la API
             * @param {string|number} query - Nombre o ID del Pokémon
             */
            function buscarPokemon(query) {
                if (!query && query !== 0) return;

                // Convertir a string y limpiar espacios
                let searchQuery = query.toString().trim().toLowerCase();

                // Mostrar spinner y ocultar resultados anteriores
                $('#loadingSpinner').show();
                $('#pokemonCard').addClass('d-none');
                $('#errorMessage').addClass('d-none');

                // Petición AJAX a PokeAPI
                $.ajax({
                    url: `https://pokeapi.co/api/v2/pokemon/${searchQuery}`,
                    method: 'GET',
                    dataType: 'json',
                    timeout: 10000,
                    success: function (data) {
                        mostrarPokemon(data);
                    },
                    error: function (xhr, status, error) {
                        console.error('Error:', error);
                        $('#loadingSpinner').hide();
                        $('#errorMessage').removeClass('d-none');
                    },
                    complete: function () {
                        $('#loadingSpinner').hide();
                    }
                });
            }

            /**
             * Función para mostrar los datos del Pokémon en la tarjeta
             * @param {Object} data - Datos del Pokémon recibidos de la API
             */
            function mostrarPokemon(data) {
                // Información básica
                $('#pokemonName').text(data.name);
                $('#pokemonId').text(`#${data.id.toString().padStart(4, '0')}`);

                // Imagen - intentar con diferentes versiones
                let imageUrl = data.sprites.other['official-artwork'].front_default ||
                               data.sprites.other.home.front_default ||
                               data.sprites.front_default;
                $('#pokemonImage').attr('src', imageUrl);

                // Estadísticas
                let statsHtml = '';
                const statNames = {
                    'hp': 'HP',
                    'attack': 'Ataque',
                    'defense': 'Defensa',
                    'special-attack': 'Ataque Esp.',
                    'special-defense': 'Defensa Esp.',
                    'speed': 'Velocidad'
                };

                data.stats.forEach(stat => {
                    const statName = stat.stat.name;
                    const displayName = statNames[statName] || statName.replace('-', ' ');
                    const baseStat = stat.base_stat;
                    const percentage = (baseStat / 255) * 100;

                    statsHtml += `
                        <div class="mb-2">
                            <div class="d-flex justify-content-between">
                                <small class="text-capitalize">${displayName}</small>
                                <small class="fw-bold">${baseStat}</small>
                            </div>
                            <div class="progress" style="height: 8px;">
                                <div class="progress-bar bg-primary" 
                                     style="width: ${percentage}%" 
                                     role="progressbar"
                                     aria-valuenow="${baseStat}" 
                                     aria-valuemin="0" 
                                     aria-valuemax="255">
                                </div>
                            </div>
                        </div>
                    `;
                });
                $('#stats').html(statsHtml);

                // Tipos
                let typesHtml = '';
                const typeColors = {
                    normal: 'secondary',
                    fire: 'danger',
                    water: 'info',
                    electric: 'warning',
                    grass: 'success',
                    ice: 'info',
                    fighting: 'danger',
                    poison: 'purple',
                    ground: 'warning',
                    flying: 'info',
                    psychic: 'pink',
                    bug: 'success',
                    rock: 'secondary',
                    ghost: 'dark',
                    dragon: 'primary',
                    dark: 'dark',
                    steel: 'secondary',
                    fairy: 'pink'
                };

                data.types.forEach(type => {
                    const typeName = type.type.name;
                    const colorClass = typeColors[typeName] || 'primary';
                    typesHtml += `<span class="badge bg-${colorClass} me-2 mb-2 text-capitalize px-3 py-2">${typeName}</span>`;
                });
                $('#types').html(typesHtml);

                // Habilidades
                let abilitiesHtml = '';
                data.abilities.forEach(ability => {
                    const isHidden = ability.is_hidden ? ' (Oculta)' : '';
                    abilitiesHtml += `<span class="badge bg-light text-dark me-2 mb-2 text-capitalize px-3 py-2 border">${ability.ability.name.replace('-', ' ')}${isHidden}</span>`;
                });
                $('#abilities').html(abilitiesHtml);

                // Altura, peso y experiencia
                $('#height').html(`${(data.height / 10).toFixed(1)} <small class="text-muted fw-normal">m</small>`);
                $('#weight').html(`${(data.weight / 10).toFixed(1)} <small class="text-muted fw-normal">kg</small>`);
                $('#baseExperience').html(`${data.base_experience || '?'} <small class="text-muted fw-normal">exp</small>`);

                // Mostrar la tarjeta
                $('#pokemonCard').removeClass('d-none');
            }

            // ============================================
            // EVENTOS
            // ============================================

            // Evento click en botón buscar
            $('#searchBtn').click(function () {
                const query = $('#pokemonInput').val();
                if (query) {
                    buscarPokemon(query);
                } else {
                    alert('Por favor ingresa un nombre o ID de Pokémon');
                }
            });

            // Evento Enter en el input
            $('#pokemonInput').keypress(function (e) {
                if (e.which === 13) {
                    const query = $(this).val();
                    if (query) {
                        buscarPokemon(query);
                    }
                }
            });

            // Evento botón aleatorio
            $('#randomBtn').click(function () {
                const randomId = Math.floor(Math.random() * 898) + 1;
                buscarPokemon(randomId);
                $('#pokemonInput').val(randomId);
            });

            // Precargar Pikachu al iniciar
            setTimeout(() => {
                buscarPokemon('pikachu');
                $('#pokemonInput').val('pikachu');
            }, 500);
        });
    </script>
</body>

</html>
